services:
  - type: web
    name: fixflow-saas-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fixflow-saas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false
      - key: APP_ORIGINS
        sync: false
      - key: BILLING_TRANSFER_BANK_NAME
        sync: false
      - key: BILLING_TRANSFER_ACCOUNT_HOLDER
        sync: false
      - key: BILLING_TRANSFER_CLABE
        sync: false
      - key: BILLING_TRANSFER_ACCOUNT_NUMBER
        sync: false
      - key: BILLING_TRANSFER_REFERENCE_LABEL
        sync: false
      - key: BILLING_TRANSFER_NOTE
        sync: false
      - key: BILLING_SUPPORT_EMAIL
        sync: false
      - key: BILLING_SUPPORT_WHATSAPP
        sync: false
      - key: BILLING_OPERATOR_SECRET
        sync: false

databases:
  - name: fixflow-saas-db
    plan: free
    databaseName: fixflow_saas
    user: fixflow_saas_user

