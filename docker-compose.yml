services:
  postgres:
    image: postgres:16
    container_name: fixflow-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixflow_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
